# File nay dat tai: /etc/nginx/sites-available/myapp
# Sau khi cap SSL, Certbot se tu dong them phan HTTPS

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Phuc vu Angular frontend
    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Chuyen tiep API requests den .NET backend
    location /api/ {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Swagger UI (co the xoa khi production on dinh)
    location /swagger/ {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
    }
}
